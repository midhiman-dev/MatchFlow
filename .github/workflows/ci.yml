name: MatchFlow Automated Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/matchflow

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22.x'
        cache: 'npm'
        cache-dependency-path: './apps/matchflow/package-lock.json'
        
    - name: Install dependencies
      run: npm install

    - name: Run ESLint
      run: npm run lint
      
    - name: Run Tests
      run: npm run test

    - name: Build Application
      run: npm run build
